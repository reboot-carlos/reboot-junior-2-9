services:

  # ── FastAPI backend ─────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "8001:8001"
    networks:
      - chatbot-net
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8001/')"
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

  # ── Nginx frontend (static files + API reverse proxy) ──────────────────────
  frontend:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    ports:
      - "8080:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - chatbot-net
    restart: unless-stopped

networks:
  chatbot-net:
    driver: bridge
