server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Compression ──────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/html
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;
    gzip_min_length 1024;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options      "SAMEORIGIN"    always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header Referrer-Policy      "same-origin"   always;

    # ── Static asset caching ─────────────────────────────────────────────────
    location ~* \.(css|js|svg|jpeg|jpg|png|gif|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── config.json: no cache (may change between deployments) ───────────────
    location = /config.json {
        add_header Cache-Control "no-store";
    }

    # ── API reverse proxy → FastAPI backend ──────────────────────────────────
    # Proxies /chat and /langues to the internal api service.
    # The frontend JS uses fetch('/chat') (same-origin), nginx forwards it here.
    location ~ ^/(chat|langues)$ {
        proxy_pass         http://api:8001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
    }

    # ── API health (used by docker-compose depends_on probes) ────────────────
    location = /api/health {
        proxy_pass http://api:8001/;
        access_log off;
    }

    # ── Frontend SPA fallback ────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ $uri.html =404;
    }
}
